<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Govt.ITI, Jajpur Performance Portal</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.95);
            --success: #10b981;
            --accent: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #1e293b;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 20px; color: white; }
        header h1 { 
            font-size: 2.8rem; 
            letter-spacing: -1px; 
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-display {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 15px 25px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        .filter-panel {
            background: var(--glass);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .filter-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }

        select, input { 
            padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; 
            background: #f8fafc; font-size: 1rem; cursor: pointer;
        }

        .search-btn {
            background: var(--primary); color: white; border: none; padding: 12px 20px; 
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        .auth-panel { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); color: white; 
            padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 30px; 
        }

        .login-btn { 
            background: var(--primary); color: white; border: none; padding: 15px 35px; 
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 16px;
        }

        .trade-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 25px; }
        .tab-link { 
            background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.1); padding: 12px 24px; 
            border-radius: 30px; cursor: pointer; white-space: nowrap; transition: 0.3s; font-weight: 600;
        }
        .tab-link.active { background: white; color: var(--dark); box-shadow: 0 5px 15px rgba(99,102,241,0.4); }

        .tab-pane { 
            display: none; background: var(--glass); border-radius: 24px; 
            padding: 35px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .tab-pane.active { display: block; animation: fadeIn 0.4s ease-out; }

        .section-title { 
            color: var(--secondary); margin: 30px 0 20px 0; font-size: 1.4rem; 
            border-left: 5px solid var(--primary); padding-left: 15px; font-weight: 700;
        }

        .trainee-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; margin-bottom: 40px; 
        }
        .trainee-card { 
            background: white; border: 2px solid #f1f5f9; border-radius: 20px; 
            padding: 20px; text-align: center; transition: 0.3s; cursor: pointer; position: relative;
        }
        .trainee-card:hover { 
            transform: translateY(-10px); border-color: var(--primary); 
            box-shadow: 0 20px 40px rgba(99,102,241,0.2);
        }

        .roll-number {
            position: absolute; top: 10px; right: 10px; background: var(--primary); 
            color: white; border-radius: 50%; width: 35px; height: 35px; 
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px;
        }

        .trainee-name { 
            font-weight: 800; color: #1e293b; margin-bottom: 15px; 
            font-size: 1.1rem; line-height: 1.3;
        }
        .unit-badge { 
            font-size: 11px; padding: 4px 12px; border-radius: 20px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; margin-bottom: 15px; display: inline-block; font-weight: 600;
        }
        
        .marks-stack { text-align: left; background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .subject-line { 
            display: flex; justify-content: space-between; font-size: 12px; 
            font-weight: 700; color: #64748b; border-bottom: 1px dashed #e2e8f0; 
            padding: 4px 0; 
        }
        
        .score-tag { 
            display: block; margin: 8px 0; padding: 10px 12px; border-radius: 12px; 
            font-size: 13px; font-weight: 800; text-align: center; 
        }
        .bg-total { background: linear-gradient(135deg, #dbeafe, #bfdbfe); color: #1e40af; }
        .bg-perc { background: var(--dark); color: white; }

        .table-container { 
            width: 100%; overflow-x: auto; border-radius: 16px; 
            border: 1px solid #e2e8f0; margin-top: 30px;
        }
        .data-table { width: 100%; border-collapse: collapse; background: white; }
        .data-table th { 
            background: linear-gradient(135deg, #f8fafc, #f1f5f9); 
            padding: 15px; text-align: left; font-size: 12px; 
            color: #64748b; text-transform: uppercase; font-weight: 700;
        }
        .data-table td { padding: 15px; border-top: 1px solid #f1f5f9; font-size: 14px; }
        .row-total { font-weight: 800; color: var(--primary); }
        .row-perc { font-weight: 900; color: var(--success); }

        .search-panel {
            background: rgba(255,255,255,0.95); padding: 25px; border-radius: 20px; 
            margin-bottom: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .instructor-active { border: 3px solid var(--success) !important; box-shadow: 0 0 0 4px rgba(16,185,129,0.3) !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏛️ Govt. ITI, Jajpur</h1>
        <p>🎯 Digital Monthly Assessment Portal - Roll Number System</p>
    </header>

    <div class="date-display" id="currentDate"></div>

    <div class="filter-panel">
        <div class="filter-group">
            <label>📅 Academic Year</label>
            <select id="yearPicker" onchange="refreshUI()">
                <option value="2024">2024</option><option value="2025">2025</option>
                <option value="2026" selected>2026</option><option value="2027">2027</option>
            </select>
        </div>
        <div class="filter-group">
            <label>📆 Assessment Month</label>
            <select id="monthPicker" onchange="refreshUI()">
                <option value="01">January</option><option value="02">February</option>
                <option value="03">March</option><option value="04" selected>April</option>
                <option value="05">May</option><option value="06">June</option>
            </select>
        </div>
        <button class="search-btn" onclick="refreshUI()" style="grid-column: 1/-1; margin-top: 10px;">
            🔄 सभी Trades Refresh करें
        </button>
    </div>

    <!-- Roll Number Search Panel -->
    <div class="search-panel">
        <div style="display: flex; gap: 20px; align-items: end; flex-wrap: wrap; justify-content: center;">
            <div class="filter-group" style="width: 200px;">
                <label>🔢 Roll Number खोजें</label>
                <input type="number" id="rollSearch" min="101" max="199" placeholder="101-199" style="width: 100%;">
            </div>
            <div class="filter-group" style="width: 250px;">
                <label>👤 Student Name</label>
                <input type="text" id="nameSearch" placeholder="नाम लिखें..." style="width: 100%;">
            </div>
            <div class="filter-group" style="width: 180px;">
                <label>🏷️ Trade Name</label>
                <input type="text" id="tradeSearch" placeholder="COPA, WELDER..." style="width: 100%;">
            </div>
            <button class="search-btn" onclick="searchByRollNumber()" style="padding: 12px 25px; font-size: 16px;">🔍 खोजें</button>
            <button class="search-btn" onclick="clearSearch()" style="background: #6b7280; padding: 12px 25px; font-size: 16px;">🗑️ Clear</button>
        </div>
    </div>

    <div class="auth-panel" id="loginBox">
        <h3 style="margin-bottom: 15px;">🔐 Instructor Login</h3>
        <button class="login-btn" onclick="handleLogin()">✅ Unlock Mode (school123)</button>
        <p style="margin-top: 10px; opacity: 0.8;">Login करने के बाद Roll Numbers से Result Update करें</p>
    </div>

    <div class="trade-tabs" id="tabList"></div>
    <div id="contentWrapper"></div>
</div>

<script>
    // सभी Trades के लिए Roll Numbers के साथ Complete Roster
    const STUDENT_ROSTER = {
        'COPA': { 
            unit1: [{name: 'अमित वर्मा', roll: 101}, {name: 'सपना राय', roll: 102}, {name: 'विवेक साहू', roll: 103}], 
            unit2: [{name: 'प्रिया दास', roll: 121}, {name: 'राहुल मौर्य', roll: 122}] 
        },
        'ELECTRICIAN': { 
            unit1: [{name: 'रोहित सिंह', roll: 111}, {name: 'करण यादव', roll: 112}], 
            unit2: [{name: 'आर्यन गुप्ता', roll: 131}, {name: 'मनीष पाल', roll: 132}, {name: 'विजय', roll: 133}] 
        },
        'MMV': { 
            unit1: [{name: 'दिनेश कुमार', roll: 114}, {name: 'सुनील गौड़', roll: 115}], 
            unit2: [{name: 'बबलू सिंह', roll: 134}, {name: 'संदीप', roll: 135}, {name: 'रवि', roll: 136}] 
        },
        'WELDER': { 
            unit1: [{name: 'राजू', roll: 116}, {name: 'पिंटू', roll: 117}], 
            unit2: [{name: 'अजय', roll: 137}, {name: 'मोहित', roll: 138}, {name: 'दिवाकर', roll: 139}] 
        },
        'FITTER': { 
            unit1: [{name: 'सूरज', roll: 118}, {name: 'अभिषेक', roll: 119}], 
            unit2: [{name: 'पंकज', roll: 140}, {name: 'अनुज', roll: 141}, {name: 'आकाश', roll: 142}] 
        },
        'SOLAR': { 
            unit1: [{name: 'पवन', roll: 123}, {name: 'शिवम', roll: 124}], 
            unit2: [{name: 'रितेश', roll: 143}, {name: 'अंकित', roll: 144}, {name: 'साहिल', roll: 145}] 
        },
        'COSMETOLOGY': { 
            unit1: [{name: 'खुशबू', roll: 125}, {name: 'अंजलि', roll: 126}], 
            unit2: [{name: 'पूनम', roll: 146}, {name: 'कविता', roll: 147}] 
        }
    };

    const TRADE_LIST = Object.keys(STUDENT_ROSTER);
    
    let isInstructor = false;
    let currentSearchResults = [];

    function updateDateDisplay() {
        const now = new Date();
        const options = { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            timeZone: 'Asia/Kolkata'
        };
        document.getElementById('currentDate').textContent = `📅 आज का दिन: ${now.toLocaleDateString('hi-IN', options)}`;
    }
    
    function startSystem() {
        renderTabs();
        renderContainers();
        updateDateDisplay();
        refreshUI();
    }

    function renderTabs() {
        const tabList = document.getElementById('tabList');
        TRADE_LIST.forEach((trade, idx) => {
            const btn = document.createElement('button');
            btn.className = `tab-link ${idx === 0 ? 'active' : ''}`;
            btn.innerText = trade;
            btn.onclick = (e) => switchTrade(trade, e.target);
            tabList.appendChild(btn);
        });
    }

    function renderContainers() {
        const wrapper = document.getElementById('contentWrapper');
        TRADE_LIST.forEach((trade, idx) => {
            wrapper.innerHTML += `
                <div id="pane-${trade}" class="tab-pane ${idx === 0 ? 'active' : ''}">
                    <h2 style="margin-bottom:25px; color: var(--dark); font-size: 1.8rem;">
                        📋 ${trade} - Roll Number Results (Max: 130)
                    </h2>
                    
                    <h3 class="section-title">👥 Unit 1 Students (Roll 101-120)</h3>
                    <div class="trainee-grid" id="grid-${trade}-u1"></div>
                    
                    <h3 class="section-title">👥 Unit 2 Students (Roll 121-149)</h3>
                    <div class="trainee-grid" id="grid-${trade}-u2"></div>
                    
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>🏆 Rank</th><th>🔢 Roll</th><th>👤 Name</th><th>Grp</th>
                                    <th>TP (50)</th><th>TT (50)</th><th>ES (30)</th><th>📊 Total</th><th>%</th>
                                </tr>
                            </thead>
                            <tbody id="table-${trade}"></tbody>
                        </table>
                    </div>
                </div>
            `;
        });
    }

    function refreshUI() {
        TRADE_LIST.forEach(trade => {
            renderStudentGrid(trade);
            renderRankingTable(trade);
        });
    }
    function renderStudentGrid(trade) {
        const year = document.getElementById('yearPicker').value;
        const month = document.getElementById('monthPicker').value;
        const dbKey = `DB_${trade}_${month}_${year}`;
        const records = JSON.parse(localStorage.getItem(dbKey)) || {};

        ['unit1', 'unit2'].forEach(uKey => {
            const gridId = `grid-${trade}-${uKey === 'unit1' ? 'u1' : 'u2'}`;
            const grid = document.getElementById(gridId);
            let gridContent = '';

            STUDENT_ROSTER[trade][uKey].forEach(student => {
                const {name, roll} = student;
                const data = records[roll] || { tp: '-', tt: '-', es: '-' };
                let total = 0;
                let percVal = "Pending";
                
                if(data.tp !== '-') {
                    total = (parseInt(data.tp)||0) + (parseInt(data.tt)||0) + (parseInt(data.es)||0);
                    percVal = ((total / 130) * 100).toFixed(1) + "%";
                }

                gridContent += `
                    <div class="trainee-card ${isInstructor ? 'instructor-active' : ''}" onclick="entryForm('${trade}', ${roll})">
                        <div class="roll-number">R-${roll}</div>
                        <span class="unit-badge">${uKey.toUpperCase()}</span>
                        <div class="trainee-name">${name}</div>
                        <div class="marks-stack">
                            <div class="subject-line"><span>TP:</span> <span>${data.tp}</span></div>
                            <div class="subject-line"><span>TT:</span> <span>${data.tt}</span></div>
                            <div class="subject-line"><span>ES:</span> <span>${data.es}</span></div>
                        </div>
                        <span class="score-tag bg-total">Total: ${data.tp === '-' ? '-' : total}</span>
                        <span class="score-tag bg-perc">${percVal}</span>
                    </div>
                `;
            });
            grid.innerHTML = gridContent;
        });
    }

    function renderRankingTable(trade) {
        const year = document.getElementById('yearPicker').value;
        const month = document.getElementById('monthPicker').value;
        const dbKey = `DB_${trade}_${month}_${year}`;
        const records = JSON.parse(localStorage.getItem(dbKey)) || {};

        const allStudents = [
            ...STUDENT_ROSTER[trade].unit1,
            ...STUDENT_ROSTER[trade].unit2
        ];

        const ranking = allStudents
            .map(s => {
                const data = records[s.roll] || { tp: 0, tt: 0, es: 0 };
                const total = (parseInt(data.tp)||0) + (parseInt(data.tt)||0) + (parseInt(data.es)||0);
                const percent = ((total / 130) * 100).toFixed(2);
                return { ...s, ...data, total, percent };
            })
            .filter(s => s.total > 0)
            .sort((a, b) => b.total - a.total);

        const tbody = document.getElementById(`table-${trade}`);
        let tableContent = '';
        ranking.forEach((s, i) => {
            tableContent += `
                <tr>
                    <td><strong style="color: ${i<3 ? '#f59e0b' : '#1e293b'}">${i+1}</strong></td>
                    <td><strong>R-${s.roll}</strong></td>
                    <td>${s.name}</td>
                    <td>${s.roll < 121 ? 'U1' : 'U2'}</td>
                    <td>${s.tp}</td><td>${s.tt}</td><td>${s.es}</td>
                    <td class="row-total">${s.total}</td>
                    <td class="row-perc">${s.percent}%</td>
                </tr>`;
        });
        
        if(ranking.length === 0) {
            tableContent = '<tr><td colspan="9" style="text-align:center; padding:40px; color:#64748b; font-size:16px;">📝 अभी कोई result enter नहीं किया गया। Roll Number click करके update करें!</td></tr>';
        }
        
        tbody.innerHTML = tableContent;
    }

    // 🔢 Roll Number से Search
    function searchByRollNumber() {
        const rollSearch = parseInt(document.getElementById('rollSearch').value);
        const nameSearch = document.getElementById('nameSearch').value.toLowerCase().trim();
        const tradeSearch = document.getElementById('tradeSearch').value.toUpperCase().trim();
        
        if (!rollSearch && !nameSearch && !tradeSearch) {
            alert('कृपया Roll Number या Name या Trade में से कुछ भरें!');
            return;
        }

        let filteredStudents = [];
        
        // सभी trades में search करें
        TRADE_LIST.forEach(trade => {
            const allStudents = [...STUDENT_ROSTER[trade].unit1, ...STUDENT_ROSTER[trade].unit2];
            
            const matches = allStudents.filter(student => {
                const matchesRoll = !rollSearch || student.roll === rollSearch;
                const matchesName = !nameSearch || student.name.toLowerCase().includes(nameSearch);
                const matchesTrade = !tradeSearch || trade.includes(tradeSearch);
                return matchesRoll && matchesName && matchesTrade;
            });
            
            filteredStudents = filteredStudents.concat(matches.map(s => ({...s, trade})));
        });

        currentSearchResults = filteredStudents;
        displaySearchResults(filteredStudents);
    }

    function displaySearchResults(students) {
        if(students.length === 0) {
            alert('❌ कोई student नहीं मिला!');
            return;
        }

        const activeTrade = document.querySelector('.tab-link.active').innerText;
        const activePane = document.getElementById(`pane-${activeTrade}`);
        
        // Hide existing grids
        const existingGrids = activePane.querySelectorAll('.trainee-grid');
        existingGrids.forEach(grid => grid.style.display = 'none');

        // Create search results grid
        const searchGrid = document.createElement('div');
        searchGrid.className = 'trainee-grid';
        searchGrid.id = 'search-results-grid';
        searchGrid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 30px; background: #f0f9ff; border-radius: 16px; margin-bottom: 20px;">
                <h3 style="color: var(--primary); margin-bottom: 10px;">🔍 Search Results (${students.length} found)</h3>
                <button class="search-btn" onclick="clearSearch()" style="padding: 8px 20px; font-size: 14px;">Back to All</button>
            </div>
        `;

        const year = document.getElementById('yearPicker').value;
        const month = document.getElementById('monthPicker').value;
        const records = JSON.parse(localStorage.getItem(`DB_${activeTrade}_${month}_${year}`)) || {};

        students.forEach(student => {
            const data = records[student.roll] || { tp: '-', tt: '-', es: '-' };
            let total = 0, percVal = "Pending";
            
            if(data.tp !== '-') {
                total = (parseInt(data.tp)||0) + (parseInt(data.tt)||0) + (parseInt(data.es)||0);
                percVal = ((total / 130) * 100).toFixed(1) + "%";
            }

            searchGrid.innerHTML += `
                <div class="trainee-card instructor-active" onclick="entryForm('${student.trade}', ${student.roll})">
                    <div class="roll-number">R-${student.roll}</div>
                    <span class="unit-badge">${student.roll < 121 ? 'U1' : 'U2'}</span>
                    <div class="trainee-name">${student.name}</div>
                    <div class="marks-stack">
                        <div class="subject-line"><span>TP:</span> <span>${data.tp}</span></div>
                        <div class="subject-line"><span>TT:</span> <span>${data.tt}</span></div>
                        <div class="subject-line"><span>ES:</span> <span>${data.es}</span></div>
                    </div>
                    <span class="score-tag bg-total">Total: ${data.tp === '-' ? '-' : total}</span>
                    <span class="score-tag bg-perc">${percVal}</span>
                </div>
            `;
        });

        activePane.appendChild(searchGrid);
    }

    function clearSearch() {
        document.getElementById('rollSearch').value = '';
        document.getElementById('nameSearch').value = '';
        document.getElementById('tradeSearch').value = '';
        currentSearchResults = [];
        
        const activeTrade = document.querySelector('.tab-link.active').innerText;
        const activePane = document.getElementById(`pane-${activeTrade}`);
        const searchGrid = activePane.querySelector('#search-results-grid');
        if (searchGrid) searchGrid.remove();
        
        const grids = activePane.querySelectorAll('.trainee-grid');
        grids.forEach(grid => grid.style.display = 'grid');
    }

    // Roll Number से Result Update
    function entryForm(trade, roll) {
        if (!isInstructor) {
            alert("🔒 पहले Instructor Mode Unlock करें! (school123)");
            return;
        }

        const year = document.getElementById('yearPicker').value;
        const month = document.getElementById('monthPicker').value;
        const dbKey = `DB_${trade}_${month}_${year}`;
        const records = JSON.parse(localStorage.getItem(dbKey)) || {};
        
        // Student name find करें roll से
        let studentName = '';
        const allStudents = [...STUDENT_ROSTER[trade].unit1, ...STUDENT_ROSTER[trade].unit2];
        const student = allStudents.find(s => s.roll == roll);
        if(student) studentName = student.name;

        const current = records[roll] || { tp: 0, tt: 0, es: 0 };

        const tp = prompt(`R-${roll} ${studentName}\n\nEnter TP Marks (0-50):`, current.tp);
        if (tp === null) return;
        
        const tt = prompt(`R-${roll} ${studentName}\n\nEnter TT Marks (0-50):`, current.tt);
        if (tt === null) return;
        
        const es = prompt(`R-${roll} ${studentName}\n\nEnter ES Marks (0-30):`, current.es);
        if (es === null) return;

        records[roll] = {
            tp: Math.max(0, Math.min(parseInt(tp) || 0, 50)),
            tt: Math.max(0, Math.min(parseInt(tt) || 0, 50)),
            es: Math.max(0, Math.min(parseInt(es) || 0, 30))
        };

        localStorage.setItem(dbKey, JSON.stringify(records));
        refreshUI();
        
        const total = records[roll].tp + records[roll].tt + records[roll].es;
        alert(`✅ R-${roll} का Result Update हो गया!\nTotal: ${total}/130`);
    }

    function switchTrade(trade, btn) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById(`pane-${trade}`).classList.add('active');
        btn.classList.add('active');
        clearSearch();
    }

    function handleLogin() {
        const secret = prompt("🔑 Instructor Key डालें:");
        if (secret === "school123") {
            isInstructor = true;
            document.getElementById('loginBox').innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                    <span style="color: var(--success); font-size: 24px;">✅</span>
                    <strong style="color: var(--success); font-size: 18px;">Instructor Mode Active</strong>
                </div>
                <p style="opacity: 0.8; margin-top: 10px;">अब Roll Numbers click करके result update करें</p>
            `;
            refreshUI(); // Instructor mode के बाद cards highlight करें
        } else {
            alert("❌ गलत Key! सही Key: school123");
        }
    }

    window.onload = startSystem;
</script>
</body>
</html>
